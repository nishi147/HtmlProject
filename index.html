<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manshu Learning - Change Advice Notice Process Training</title>
  <meta name="description" content="Interactive e-learning course for the Manshu Learning Change Advice Notice (CAN) Process in the Atlantic Region operations.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page-container">

    <!-- SCREEN 1: LANDING/WELCOME SCREEN -->
    <div id="landing-screen" class="screen active">
      <!-- Loaded dynamically from components/landing.html -->
    </div>

    <!-- SCREEN 2: MAIN STORYLINE PLAYER INTERFACE -->
    <div id="dashboard-screen" class="screen">
      
      <!-- TOP UTILITY BAR -->
      <div class="player-top-utility-bar">
        <div class="utility-left">
          <span class="utility-course-title">Change Advice Notice Process</span>
        </div>
        <div class="utility-right">
          <button class="utility-link-btn" onclick="toggleTranscript()">TRANSCRIPT</button>
          <button class="utility-link-btn" onclick="openNotesModal()">MY NOTES</button>
          <button class="utility-link-btn" id="btn-utility-help" onclick="openHelpModal()">HELP</button>
          <button class="utility-link-btn" id="btn-utility-exit" onclick="exitCourse()">EXIT</button>
        </div>
      </div>
      
      <!-- TRANSCRIPT POPUP BUBBLE -->
      <div class="transcript-dropdown-bubble" id="transcript-bubble">
        <p id="transcript-text">Welcome to the course.</p>
      </div>

      <!-- PLAYER WORKSPACE WRAPPER -->
      <div class="player-workspace-wrapper">
      
        <!-- LEFT SIDEBAR -->
        <aside class="player-sidebar" id="player-sidebar">
          <!-- Sidebar Header: Logo + Collapse btn -->
          <div class="sidebar-header-panel">
            <div class="sidebar-logo-block">
              <img class="logo-img-header" src="assets/logo.png" alt="Manshu Learning Logo">
            </div>
            <button class="btn-sidebar-collapse" onclick="toggleSidebar()" aria-label="Collapse Sidebar">
              <!-- Collapse arrow icon -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>
          </div>
          
          <!-- Sidebar Subtabs -->
          <div class="sidebar-tabs">
            <button class="sidebar-tab-btn active" id="tab-btn-menu" onclick="switchSidebarTab('menu')">MENU</button>
            <button class="sidebar-tab-btn" id="tab-btn-glossary" onclick="switchSidebarTab('glossary')">GLOSSARY</button>
            <button class="sidebar-tab-btn" id="tab-btn-resources" onclick="switchSidebarTab('resources')">RESOURCES</button>
          </div>
          
          <!-- Sidebar Search Bar -->
          <div class="sidebar-search-container" id="sidebar-search-box">
            <input type="text" id="outline-search" placeholder="Search..." oninput="filterOutlineList()">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </div>

          <!-- Tab 1 Container: Menu Outline List (Scrollable) -->
          <div class="sidebar-tab-content active" id="tab-content-menu">
            <!-- Loaded dynamically from components/menu.html -->
          </div>
          
          <!-- Tab 2 Container: Glossary (Scrollable, Hidden Initially) -->
          <div class="sidebar-tab-content" id="tab-content-glossary">
            <!-- Loaded dynamically from components/glossary.html -->
          </div>
          
          <!-- Tab 3 Container: Resources (Hidden Initially) -->
          <div class="sidebar-tab-content" id="tab-content-resources">
            <!-- Loaded dynamically from components/resources.html -->
          </div>
        </aside>
        
        <!-- COLLAPSED SIDEBAR BUTTON BAR (Triggers showing menu when sidebar is collapsed) -->
        <button class="btn-sidebar-expand" id="btn-sidebar-expand" onclick="toggleSidebar()" aria-label="Expand Sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>

        <!-- MAIN CONTENT WRAPPER -->
        <div class="player-main-canvas">
          
          <!-- TOP HEADER BAR -->
          <header class="player-header">
            <h2 class="player-course-title" id="player-active-title">Change Advice Notice Process</h2>
            <div class="player-header-right">
              <!-- Slide count display badge -->
              <span class="slide-count-pill" id="slide-count-badge">1 of 23</span>
            </div>
          </header>
          
          <!-- Orange Separation Accent Bar -->
          <div class="player-header-accent-strip"></div>
          
          <!-- CONTENT CORE CANVAS -->
          <main class="player-slide-content" id="slide-canvas">
            <div class="watermark-bg"></div>
            <!-- Slides will be loaded dynamically from /slides/slide-X.html on DOMContentLoaded -->
          </main>
          
          <!-- PLAYER CONTROL FOOTER BAR -->
          <footer class="player-controls">
            <div class="controls-right" style="width: 100%; justify-content: flex-end; gap: 15px; display: flex; align-items: center;">
              <!-- Navigation -->
              <button class="btn-player-nav-premium" id="btn-prev-slide" onclick="changeSlideRedesign(-1)" aria-label="Previous slide">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px;"><polyline points="15 18 9 12 15 6"></polyline></svg>
              </button>
              <button class="btn-player-nav-premium" id="btn-next-slide" onclick="changeSlideRedesign(1)" aria-label="Next slide">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px;"><polyline points="9 18 15 12 9 6"></polyline></svg>
              </button>
            </div>
          </footer>

        </div> <!-- end player-main-canvas -->
        
      </div> <!-- end player-workspace-wrapper -->

      <!-- NOTES MODAL CONTAINER -->
      <div id="notes-modal-container"></div>

      <!-- HELP MODAL CONTAINER -->
      <div id="help-modal-container"></div>

      <!-- EXIT MODAL CONTAINER -->
      <div id="exit-modal-container"></div>
      
    </div> <!-- end dashboard screen -->

  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none;"></div>

  <!-- Modular Course Scripts -->
  <script src="js/state.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/cert.js"></script>
  <script src="js/slides.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
